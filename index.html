<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Esora Maps</title>
<!-- PWA: スマホでインストール可能に (ホーム画面に追加 / インストール) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3b82c4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Esora">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #bfd6a4;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
  }
  #map {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: grab;
  }
  #map.dragging { cursor: grabbing; }
  .logo {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 12px;
    pointer-events: none;
    background: rgba(255,255,255,.92);
    border-radius: 10px;
    padding: 7px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    font-weight: 700;
    font-size: 16px;
    color: #2d3748;
    letter-spacing: .02em;
  }
  .logo span { color: #3b82c4; }
  .hint {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    background: rgba(30,35,40,.75);
    color: #fff;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
    transition: opacity 1.2s ease;
  }
  .hint.fade { opacity: 0; }
</style>
</head>
<body>
<canvas id="map"></canvas>
<div class="logo">Esora <span>Maps</span></div>
<div class="hint" id="hint">ドラッグで移動・ピンチ / ホイール / ダブルタップでズーム</div>
<script type="module" src="main.js"></script>
<script>
  // Service Worker 登録 (インストール可能化 + オフライン)。HTTPS か localhost 配信時のみ有効。
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
