<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Esora Maps</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #bfd6a4;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
  }
  #map {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: grab;
  }
  #map.dragging { cursor: grabbing; }
  .logo {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    left: 12px;
    pointer-events: none;
    background: rgba(255,255,255,.92);
    border-radius: 10px;
    padding: 7px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    font-weight: 700;
    font-size: 16px;
    color: #2d3748;
    letter-spacing: .02em;
  }
  .logo span { color: #3b82c4; }
  .hint {
    position: fixed;
    bottom: max(14px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    background: rgba(30,35,40,.75);
    color: #fff;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
    transition: opacity 1.2s ease;
  }
  .hint.fade { opacity: 0; }
</style>
</head>
<body>
<canvas id="map"></canvas>
<div class="logo">Esora <span>Maps</span></div>
<div class="hint" id="hint">ドラッグで移動・ピンチ / ホイール / ダブルタップでズーム</div>
<script type="module" src="main.js"></script>
</body>
</html>
